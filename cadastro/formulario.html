<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body>
    <form action="" id="formulario" method="POST" name="formulario">
      <legend>Cadastro do Usuário</legend>

      <div>
        <label for="nome">Nome completo:</label>
        <input
          type="text"
          id="nome"
          name="nome"
          placeholder="Insira seu nome"
        />
      </div>
      <div>
        <label for="cpf">Cpf:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Insira seu Cpf" />
      </div>
      <div>
        <label for="email">E-mail:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Insira seu e-mail"
        />
      </div>
      <div>
        <label for="telefone">Telefone:</label>
        <input
          type="text"
          id="telefone"
          name="telefone"
          placeholder="Insira seu Telefone: (xx)xxxxx-xxxx"
        />
      </div>
      <div>
        <label for="github">GitHub:</label>
        <input
          type="text"
          id="github"
          name="github"
          placeholder="Insira seu GitHub"
        />
      </div>
      <div class="footer">
        <button type="button" class="botao" onclick="validarDados()">
          Cadastrar
        </button>
        <a href="/index.html ">
          <button type="button" class="botao">Voltar à Pagina Inicial</button>
        </a>
      </div>
    </form>

    <script>
      function validarEmail(email) {
        return /\S+@\S+\.\S+/.test(email)
      }
      function validarTelefone(telefone) {
        return /\([0-9]{2}\)9[0-9]{4}-[0-9]{4}/.test(telefone)
      }

      function validarGithub(github) {
        return /((http|https):\/\/)?(www\.)?(github\.com)(\/)?([a-zA-Z0-9\-\.]+)\/?/.test(
          github
        )
      }

      function validarCpf(cpf) {
        strCPF = cpf + ''
        var Soma
        var Resto
        Soma = 0
        if (strCPF == '00000000000') return false

        for (i = 1; i <= 9; i++)
          Soma = Soma + parseInt(strCPF.substring(i - 1, i)) * (11 - i)
        Resto = (Soma * 10) % 11

        if (Resto == 10 || Resto == 11) Resto = 0
        if (Resto != parseInt(strCPF.substring(9, 10))) return false

        Soma = 0
        for (i = 1; i <= 10; i++)
          Soma = Soma + parseInt(strCPF.substring(i - 1, i)) * (12 - i)
        Resto = (Soma * 10) % 11

        if (Resto == 10 || Resto == 11) Resto = 0
        if (Resto != parseInt(strCPF.substring(10, 11))) return false
        return true
      }

      function validarDados() {
        var nome = document.getElementById('nome').value
        var cpf = document.getElementById('cpf').value
        var email = document.getElementById('email').value
        var telefone = document.getElementById('telefone').value
        var github = document.getElementById('github').value

        if (nome == '') {
          alert('Nome não informado!')
          return
        }

        if (email == '') {
          alert('E-mail não informado!')
          return
        } else {
          if (!validarEmail(email)) {
            alert('E-mail incorreto!')
            return
          }
        }

        if (cpf == '') {
          alert('Cpf não informado!')
          return
        } else {
          if (!validarCpf(cpf)) {
            alert('CPF incorreto!')
            return
          }
        }

        if (telefone == '') {
          alert('Telefone não informado!')
          return
        } else {
          if (!validarTelefone(telefone)) {
            alert('Telefone incorreto!')
            return
          }
        }
        if (github == '') {
          alert('Github não informado!')
          return
        } else {
          if (!validarGithub(github)) {
            alert('URL do Github  incorreto!')
            return
          }
        }

        alert('Formulário enviado!')
      }
    </script>
  </body>
</html>
